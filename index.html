<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de Estaciones Ferroviarias BCYL</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0d1b2a;min-height:100vh}
.rail{height:7px;background:repeating-linear-gradient(90deg,#e8a020 0,#e8a020 20px,transparent 20px,transparent 32px)}
header{background:linear-gradient(135deg,#1b3a6b,#0d1b2a);padding:24px 20px 18px;text-align:center;border-bottom:2px solid #e8a020}
header h1{color:#fff;font-size:clamp(16px,4vw,28px);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:6px 0}
header h1 span{color:#e8a020}
header p{color:#8ba8cc;font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin:4px 0 10px}
.badges{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.badge{border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700}
main{max-width:720px;margin:0 auto;padding:22px 14px 60px}
.search-box{background:#fff;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.4);padding:20px 24px 16px;margin-bottom:20px}
.search-label{display:block;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#2d5a9e;margin-bottom:7px}
.search-row{display:flex;gap:8px}
.search-input{flex:1;border:2px solid #c8d8ee;border-radius:8px;padding:10px 14px;font-size:20px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#1b3a6b;outline:none;background:#f0f4fb;min-width:0}
.search-input:focus{border-color:#2d5a9e}
.search-btn{background:#1b3a6b;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.search-btn:hover{background:#2d5a9e}
.hint{font-size:10px;color:#8899aa;font-style:italic;margin-top:6px}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.3);overflow:hidden}
.card-header{background:linear-gradient(135deg,#1b3a6b,#2d5a9e);padding:16px 22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.card-code{background:#e8a020;color:#1a0a00;font-size:20px;font-weight:800;padding:4px 12px;border-radius:5px;letter-spacing:.15em}
.card-name{color:#fff;font-size:clamp(14px,3vw,20px);font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex:1}
.card-ramal-badge{background:#1b3a6b;color:#FFD700;font-weight:800;font-size:14px;padding:5px 14px;border-radius:6px;letter-spacing:.06em;border:2px solid #FFD700;white-space:nowrap}
.card-body{padding:18px 22px;display:grid;grid-template-columns:1fr 1fr;gap:16px;color:#1a2332}
.field-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#2d5a9e;margin-bottom:5px}
.field-val{font-size:17px;font-weight:700;color:#1a2332}
.field-ramal-val{font-size:20px;font-weight:900;color:#FFD700;letter-spacing:.12em;background:#1b3a6b;padding:5px 14px;border-radius:6px;display:inline-block;border:2px solid #FFD700}
.linea-chip{border-radius:5px;padding:3px 10px;font-size:13px;font-weight:700;border:1px solid}
.maps-btn{display:inline-flex;align-items:center;gap:6px;background:#1b3a6b;color:#fff;text-decoration:none;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;margin-top:4px}
.maps-btn:hover{background:#2d5a9e}
.card-footer{background:#f8fafc;border-top:1px solid #e8eef6;padding:7px 22px;font-size:10px;color:#8899aa;display:flex;align-items:center;gap:6px}
.fchip{border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700}
.sugs{background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.25);overflow:hidden}
.sugs-header{background:#f0f4fb;padding:9px 16px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#2d5a9e;border-bottom:1px solid #dde8f0}
.sug-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-bottom:1px solid #f0f4f8;color:#1a2332}
.sug-item:hover{background:#f0f4fb}
.sug-code{background:#1b3a6b;color:#e8a020;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;min-width:44px;text-align:center;letter-spacing:.08em;white-space:nowrap}
.sug-name{flex:1;font-weight:600;font-size:13px}
.sug-ramal{background:#1b3a6b;color:#FFD700;font-weight:800;font-size:11px;padding:2px 8px;border-radius:5px;white-space:nowrap;border:1px solid #FFD700}
.empty{background:#fff;border-radius:12px;padding:28px;text-align:center;color:#1a2332}
.full{grid-column:1/-1}
</style>
</head>
<body>
<div class="rail"></div>
<header>
  <div style="font-size:32px">🚂</div>
  <h1>Buscador de Estaciones <span>Ferroviarias</span></h1>

    <span class="badge" style="background:#dcfce7;color:#14532d">BCYLBEL · Belgrano</span>
  </div>
</header>
<div class="rail"></div>
<main>
  <div class="search-box">
    <label class="search-label">Ingresá el Código Telegráfico o nombre de estación</label>
    <div class="search-row">
      <input id="inp" class="search-input" placeholder="Ej: NCC, LLL, SALTA..." maxlength="40" autocomplete="off">
      <button class="search-btn" onclick="doSearch()">Buscar</button>
    </div>
    <p class="hint">📡 Coordenadas GPS reales · Km del plano oficial TAC 2021</p>
  </div>
  <div id="out"></div>
</main>

const estaciones=D.map(([c,e,l,r,km,p,lat,lon])=>({c,e,l,r,km,p,lat,lon}));
document.getElementById('subtitle').textContent='Red BCYL Argentina · '+estaciones.length.toLocaleString('es-AR')+' estaciones · Datos KMZ Ferromapas + TAC 2021';

const inp=document.getElementById('inp');
inp.addEventListener('input',()=>{inp.value=inp.value.toUpperCase();if(inp.value.length>=2)doSearch();else document.getElementById('out').innerHTML='';});
inp.addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

function norm(s){return s.toUpperCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ");}
function lLabel(l){return l==="BCYLURQ"?"Urquiza":l==="BCYLSM"?"San Martín":"Belgrano";}
function lStyle(l){
  if(l==="BCYLURQ") return "background:#fff3cd;color:#7a5700;border-color:#ffc107";
  if(l==="BCYLSM")  return "background:#dbeafe;color:#1e3a8a;border-color:#3b82f6";
  return "background:#dcfce7;color:#14532d;border-color:#22c55e";
}

function doSearch(){
  const qn=norm(inp.value);
  if(!qn){document.getElementById('out').innerHTML='';return;}
  const exact=estaciones.find(e=>norm(e.c)===qn);
  if(exact){showCard(exact);return;}
  const byCode=estaciones.filter(e=>norm(e.c).startsWith(qn));
  const byName=estaciones.filter(e=>norm(e.e).includes(qn)&&!byCode.includes(e));
  const sugs=[...byCode,...byName].slice(0,15);
  if(sugs.length===1){showCard(sugs[0]);return;}
  if(sugs.length===0){document.getElementById('out').innerHTML='<div class="empty"><div style="font-size:32px;margin-bottom:6px">🔍</div><h3 style="color:#8b1a1a">Sin resultados</h3><p style="color:#667;font-size:13px;margin-top:6px">Verificá el código o nombre.</p></div>';return;}
  let h='<div class="sugs"><div class="sugs-header">'+sugs.length+' coincidencias — seleccioná una</div>';
  sugs.forEach(e=>{
    h+='<div class="sug-item" onclick="pick(\''+e.c+'\')"><span class="sug-code">'+e.c+'</span><span class="sug-name">'+e.e+'</span>';
    if(e.r)h+='<span class="sug-ramal">R.'+e.r+'</span>';
    h+='<span class="linea-chip" style="'+lStyle(e.l)+'">'+lLabel(e.l)+'</span></div>';
  });
  document.getElementById('out').innerHTML=h+'</div>';
}

function pick(cod){const e=estaciones.find(x=>x.c===cod);if(e){inp.value=e.c;showCard(e);}}

function showCard(e){
  const km=e.km?parseFloat(e.km).toLocaleString('es-AR',{minimumFractionDigits:1,maximumFractionDigits:3})+' km':'Desconocido';
  const prov=e.p||'Desconocido';
  let h='<div class="card"><div class="card-header"><span class="card-code">'+e.c+'</span><span class="card-name">'+e.e+'</span>';
  if(e.r)h+='<span class="card-ramal-badge">Ramal '+e.r+'</span>';
  h+='</div><div class="card-body">';
  h+='<div><div class="field-label">🛤️ Línea Férrea</div><span class="linea-chip" style="'+lStyle(e.l)+'">'+e.l+' · '+lLabel(e.l)+'</span></div>';
  h+='<div><div class="field-label">🔤 Código Telegráfico</div><span style="font-size:24px;font-weight:800;color:#e8a020;letter-spacing:.2em">'+e.c+'</span></div>';
  if(e.r)h+='<div><div class="field-label">🚦 Ramal</div><span class="field-ramal-val">'+e.r+'</span></div>';
  h+='<div><div class="field-label">📍 Provincia</div><div class="field-val">'+prov+'</div></div>';
  h+='<div><div class="field-label">📏 Progresiva km</div><div class="field-val">'+km+'</div></div>';
  if(e.lat){
    h+='<div><div class="field-label">🌐 Latitud</div><div class="field-val">'+parseFloat(e.lat).toFixed(5)+'</div></div>';
    h+='<div><div class="field-label">🌐 Longitud</div><div class="field-val">'+parseFloat(e.lon).toFixed(5)+'</div></div>';
    h+='<div class="full"><a class="maps-btn" href="https://www.google.com/maps?q='+e.lat+','+e.lon+'" target="_blank">🗺️ Ver en Google Maps</a></div>';
  }
  h+='</div><div class="card-footer">';
  h+=e.lat?'<span class="fchip" style="background:#dcfce7;color:#14532d">✓ KMZ + TAC 2021</span> Coordenadas GPS reales · datos verificados':'<span class="fchip" style="background:#dbeafe;color:#1e3a8a">Excel BCYL</span> Código oficial del plano telegráfico';
  h+='</div></div>';
  document.getElementById('out').innerHTML=h;
}
</script>
